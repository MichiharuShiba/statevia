# ============================================================
# SonarQube - StateviaCore
# ============================================================
# .NET プロジェクトでは dotnet-sonarscanner が主要設定を管理するため、
# このファイルは補助的な設定と参照ドキュメントを兼ねる。
#
# 実行方法:
#   dotnet sonarscanner begin /k:"StateviaCore" /d:sonar.host.url="http://localhost:9000" /d:sonar.token="$SONAR_TOKEN" /d:sonar.cs.opencover.reportsPaths="**/coverage.opencover.xml"
#   dotnet build statevia.sln
#   dotnet test --collect:"XPlat Code Coverage" -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover
#   dotnet sonarscanner end /d:sonar.token="$SONAR_TOKEN"
# ============================================================
sonar.projectKey=StateviaCore
sonar.projectName=Statevia Core

sonar.host.url=http://localhost:9000

# ---- Coverage -------------------------------------------
sonar.cs.opencover.reportPaths=**/coverage.opencover.xml

# ---- Exclusions -----------------------------------------
sonar.exclusions=\
  **/bin/**,\
  **/obj/**,\
  **/TestResults/**,\
  samples/**

sonar.test.inclusions=\
  **/*.Tests/**

sonar.coverage.exclusions=\
  **/*.Tests/**,\
  samples/**
