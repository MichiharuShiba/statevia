# ============================================================
# SonarQube - StateviaCore (.NET)
# ============================================================
# プロジェクトキー・ホストは sonar-scanner.cmd の begin で指定可。
# このファイルは core/ で dotnet sonarscanner begin 実行時に読み込まれる。

# ---- 既存 Issue の扱い（新規プロジェクトで再掲載される場合） ----
# 方法1: SonarQube UI で「New Code」を設定（推奨）
#   Project Settings → General Settings → New Code
#   「Previous version」または「Number of days」を指定すると、
#   既存コードの Issue は New Code に含まれず、Quality Gate は新規コードのみ対象にできる。
#
# 方法2: 特定ルールをプロジェクト全体で無視（必要なら下のコメントを外してルールキーを指定）
# sonar.issue.ignore.allfile=csharpsquid:S1118,csharpsquid:S1135
#
# 方法3: ルール＋ファイルパターンで無視（例: テストのみ特定ルールを無視）
# sonar.issue.ignore.multicriteria=e1
# sonar.issue.ignore.multicriteria.e1.ruleKey=csharpsquid:S101
# sonar.issue.ignore.multicriteria.e1.resourceKey=**/*Tests.cs

# ---- ファイル除外（解析対象外） ----
# 既に .sonarqube/out の生成設定で coverage は除外済み。追加する場合:
# sonar.exclusions=**/coverage.opencover.xml,**/obj/**/*,**/bin/**/*

# ---- その他 ----
sonar.sourceEncoding=UTF-8
