# v2: engine (C#), service-api (C# ASP.NET Core), ui-studio (Next.js/TS)
# 初回: cp .env.example .env（POSTGRES_*）。マイグレーションは docs/operations-docker.md を参照services:
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    # C# API は EF Core マイグレーションでスキーマ作成するため init SQL は不要

  service-api:
    build:
      context: .
      dockerfile: service/api/Dockerfile
    environment:
      # ローカル compose は Development（OpenAPI / Scalar を /scalar/v1 で公開）。本番イメージ単体では Production のまま。
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: "http://+:8080"
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
      Statevia__ActionHost__BaseUrl: "http://action-host:5001"
    depends_on:
      - postgres
      - action-host
    ports:
      - "8080:8080"
    volumes:
      # Action Module 配置（ホスト ./modules → コンテナ既定ルート /app/modules）
      - ./modules:/app/modules

  action-host:
    build:
      context: .
      dockerfile: service/action-host/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: "http://+:5001"
      STATEVIA_MODULES_PATH: "/app/modules"
    ports:
      - "5001:5001"
    volumes:
      - ./modules:/app/modules

  ui-studio:
    build:
      context: ui/studio
    environment:
      CORE_API_INTERNAL_BASE: "http://service-api:8080"
    ports:
      - "3000:3000"
    depends_on:
      - service-api

volumes:
  pgdata: {}
