# ============================================================
# SonarQube - StateviaServiceCoreAPI
# ============================================================
sonar.projectKey=StateviaServiceCoreAPI
sonar.projectName=StateviaServiceCoreAPI

sonar.host.url=http://localhost:9000

# ---- Sources / Tests -----------------------------------
sonar.sources=src
sonar.tests=tests
sonar.sourceEncoding=UTF-8

# ---- TypeScript -----------------------------------------
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# ---- Exclusions -----------------------------------------
sonar.exclusions=\
  node_modules/**,\
  dist/**,\
  coverage/**,\
  **/*.test.ts,\
  **/*.config.ts

sonar.test.inclusions=tests/**/*.test.ts

# ---- Coverage Exclusions --------------------------------
sonar.coverage.exclusions=\
  **/*.test.ts,\
  **/*.config.ts,\
  src/application/commands/command-handlers.ts
