# ============================================================
# SonarQube - StateviaServiceUI
# ============================================================
sonar.projectKey=StateviaServiceUI
sonar.projectName=StateviaServiceUI

sonar.host.url=http://localhost:9000

# ---- Sources / Tests -----------------------------------
sonar.sources=app,middleware.ts
sonar.tests=tests
sonar.sourceEncoding=UTF-8

# ---- TypeScript -----------------------------------------
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# ---- Exclusions -----------------------------------------
sonar.exclusions=\
  node_modules/**,\
  .next/**,\
  coverage/**,\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.config.ts

sonar.test.inclusions=tests/**/*.test.ts,tests/**/*.test.tsx

# ---- Coverage Exclusions --------------------------------
# 方針: vitest.config.ts の coverage.exclude と同一セット（正本: .spec-workflow/specs/ui-quality-refactor/sonar-scan-results.md）
# 除外しても tests/ のスモーク・単体で主要経路は固定する。ロジックは app/lib・app/features を計測対象とする。
#
# | パターン | 除外理由 |
# | **/*.test.ts(x), **/*.config.ts | テストコード・ビルド設定（実行対象アプリではない） |
# | app/lib/uiText.ts, uiText.en.ts | i18n 文言データ（分岐・ビジネスロジックなし） |
# | app/lib/types.ts, app/graphs/types.ts | 型定義のみ（実行時コードなし） |
# | app/layout.tsx | Next.js ルートレイアウト（cookies / メタデータ。サーバー専用） |
# | app/**/page.tsx | ルート薄ラッパー（*PageClient へ委譲のみ） |
# | .../edit/DefinitionEditorPageClient.tsx | 再エクスポート 1 行（本体は DefinitionEditorPageClient.tsx） |
# | DefinitionGraphEditor, Yaml/ActionInput CodeEditor | CodeMirror / React Flow 依存 UI（tests/components/editor でスモーク） |
# | ExecutionDashboard, DefinitionEditorPageClient | 画面統合 UI（tests/ のページ・Client スモークで経路固定） |
# | NodeGraphView | React Flow 実行グラフ（tests/components/nodes/NodeGraphView.test.tsx） |
sonar.coverage.exclusions=\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.config.ts,\
  app/lib/uiText.ts,\
  app/lib/uiText.en.ts,\
  app/lib/types.ts,\
  app/graphs/types.ts,\
  app/layout.tsx,\
  app/definitions/**/edit/DefinitionEditorPageClient.tsx,\
  app/**/page.tsx,\
  app/components/editor/DefinitionGraphEditor.tsx,\
  app/components/editor/YamlCodeEditor.tsx,\
  app/components/editor/ActionInputCodeEditor.tsx,\
  app/components/execution/ExecutionDashboard.tsx,\
  app/definitions/DefinitionEditorPageClient.tsx,\
  app/components/nodes/NodeGraphView.tsx
