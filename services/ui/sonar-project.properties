# ============================================================
# SonarQube - StateviaServiceUI
# ============================================================
sonar.projectKey=StateviaServiceUI
sonar.projectName=Statevia Service UI

sonar.host.url=http://localhost:9000

# ---- Sources / Tests -----------------------------------
sonar.sources=app
sonar.tests=tests
sonar.sourceEncoding=UTF-8

# ---- TypeScript -----------------------------------------
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# ---- Exclusions -----------------------------------------
sonar.exclusions=\
  node_modules/**,\
  .next/**,\
  coverage/**,\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.config.ts

sonar.test.inclusions=tests/**/*.test.ts,tests/**/*.test.tsx

# ---- Coverage Exclusions --------------------------------
sonar.coverage.exclusions=\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.config.ts
